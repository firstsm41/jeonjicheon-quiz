name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 저장소 Actions 탭에서 수동 실행도 가능합니다

# 동시에 여러 배포가 겹치지 않도록
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # 빌드 과정이 없는 정적 사이트라 저장소 전체를 그대로 올립니다
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
