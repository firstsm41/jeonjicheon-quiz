<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>이단 예방 퀴즈</title>
    <meta name="description" content="5문항으로 점검하는 이단 분별력. QR로 접속해 바로 풀고, 실시간 누적 통계를 확인하세요." />
    <meta name="theme-color" content="#0b0a14" />

    <!-- 홈 화면에 추가했을 때 앱처럼 동작하도록 -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="이단 예방 퀴즈" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-180.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="이단 예방 퀴즈" />
    <meta property="og:description" content="5문항으로 점검하는 이단 분별력. 실시간 누적 통계 제공." />
    <meta property="og:locale" content="ko_KR" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊️</text></svg>"
    />
  </head>
  <body>
    <div class="shell">
      <!-- ── 진행자 모드 바 (평소에는 숨겨져 있습니다) ── -->
      <div class="admin-bar" id="admin-bar" hidden>
        <div class="admin-top">
          <span class="admin-tag">🔑 진행자 모드</span>
          <button type="button" class="admin-exit" id="btn-admin-exit">나가기</button>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggle-results" />
          <span class="track"><span class="thumb"></span></span>
          <span class="switch-text">
            <b>참여자에게 결과 공개</b>
            <i id="toggle-desc">지금은 진행자만 결과를 볼 수 있습니다</i>
          </span>
        </label>
      </div>

      <!-- ── 시작 ─────────────────────────────── -->
      <section id="screen-intro" class="screen active">
        <div class="card hero">
          <div class="mark">🕊️</div>
          <span class="eyebrow"><i class="dot"></i> 익명으로 진행됩니다</span>
          <h1>이단 분별력<br /><em>5문항 체크</em></h1>

          <div class="meta-row">
            <div class="meta"><b>5</b><span>문항</span></div>
            <div class="meta"><b>2분</b><span>소요 시간</span></div>
            <div class="meta"><b id="intro-count">–</b><span>참여자</span></div>
          </div>

          <button class="btn" id="btn-start">퀴즈 시작하기</button>
          <div class="btn-row results-gate" hidden>
            <button class="btn ghost" data-goto="stats">📊 결과 보기</button>
          </div>

          <p class="note">
            이름이나 개인정보는 수집하지 않습니다.<br />
            답안은 통계 목적으로만 익명 저장됩니다.
          </p>
        </div>
      </section>

      <!-- ── 퀴즈 ─────────────────────────────── -->
      <section id="screen-quiz" class="screen">
        <div class="topbar">
          <span class="count">문항 <b id="q-now">1</b> / <span id="q-total">5</span></span>
        </div>
        <div class="progress"><i id="q-bar"></i></div>

        <h2 class="question" id="q-text"></h2>
        <div class="options" id="q-options"></div>
        <div id="q-feedback"></div>

        <div class="btn-row">
          <button class="btn" id="btn-next" disabled>답안 확인</button>
        </div>
      </section>

      <!-- ── 제출 완료 · 정답 확인 ─────────────── -->
      <section id="screen-result" class="screen">
        <div class="card done-card">
          <div class="check">✓</div>
          <h2>제출되었습니다</h2>
          <p>참여해 주셔서 감사합니다.</p>
        </div>

        <div class="btn-row results-gate" hidden>
          <button class="btn" data-goto="stats">📊 전체 응답 보기</button>
        </div>
        <div class="btn-row">
          <button class="btn ghost" id="btn-retry">다시 풀기</button>
          <button class="btn ghost" id="btn-share">링크 공유</button>
        </div>

        <h3 class="section-title">정답</h3>
        <div class="review" id="review"></div>
      </section>

      <!-- ── 통계 ─────────────────────────────── -->
      <section id="screen-stats" class="screen">
        <div class="stat-head">
          <h2>전체 응답</h2>
          <span class="eyebrow" id="live-badge"><i class="dot"></i> 실시간</span>
        </div>

        <div id="stats-body">
          <div class="card count-card">
            <b id="s-total">0</b>
            <span>명 참여</span>
          </div>

          <h3 class="section-title">문항별 응답 현황</h3>
          <div class="qstats" id="qstats"></div>
        </div>

        <div class="btn-row">
          <button class="btn ghost" data-goto="intro">← 처음으로</button>
        </div>

        <p class="footer">통계는 새 답안이 들어오는 즉시 자동으로 갱신됩니다.</p>
      </section>
    </div>

    <div class="toast" id="toast"></div>

    <!-- ── 진행자 비밀번호 ─────────────────────── -->
    <div class="modal" id="pw-modal" hidden>
      <div class="modal-card">
        <h3>비밀번호 입력하세요</h3>
        <p class="modal-sub">진행자용 기능입니다.</p>
        <input
          type="password"
          id="pw-input"
          inputmode="numeric"
          autocomplete="off"
          maxlength="8"
          placeholder="••••"
        />
        <p class="modal-err" id="pw-err" hidden>비밀번호가 올바르지 않습니다.</p>
        <div class="btn-row">
          <button class="btn ghost" type="button" id="pw-cancel">취소</button>
          <button class="btn" type="button" id="pw-ok">확인</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.58.0/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>
    <script src="questions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
